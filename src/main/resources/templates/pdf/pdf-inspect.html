<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: #333; margin: 0; padding: 40px; }
        .letterhead { text-align: center; padding: 20px 0; border-bottom: 3px solid #1565c0; margin-bottom: 30px; }
        .letterhead .company { font-size: 22px; font-weight: bold; color: #1565c0; }
        .letterhead .info { font-size: 10px; color: #666; margin-top: 5px; }
        .doc-title { text-align: center; font-size: 18px; font-weight: bold; margin: 30px 0; }
        .doc-no { text-align: right; font-size: 11px; color: #888; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 8px 10px; border: 1px solid #ccc; font-size: 11px; }
        th { background: #f0f0f0; font-weight: 600; text-align: left; }
        .section-title { font-size: 14px; font-weight: bold; color: #1565c0; margin: 25px 0 10px; border-bottom: 1px solid #1565c0; padding-bottom: 5px; }
        .seal { text-align: right; margin-top: 40px; }
        .seal-img { display: inline-block; border: 2px solid #c00; border-radius: 50%; width: 60px; height: 60px; line-height: 28px; text-align: center; color: #c00; font-weight: bold; font-size: 10px; }
        .signature-area { margin-top: 40px; display: flex; justify-content: space-between; }
        .sign-box { text-align: center; width: 200px; }
        .sign-box .label { font-size: 11px; color: #888; margin-bottom: 5px; }
        .sign-box .line { border-bottom: 1px solid #333; height: 40px; margin-bottom: 3px; }
        .sign-box img { max-height: 40px; }

        /* === Galaxy Tab S8 세로모드 반응형 === */
        @media (max-width: 900px) {
            body { padding: 16px; }
            .letterhead .company { font-size: 18px; }
            .doc-title { font-size: 15px; }
            table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            th, td { padding: 6px 8px; font-size: 10px; min-width: 50px; }
            .signature-area { flex-direction: column; gap: 16px; }
            .sign-box { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- 레터헤드 -->
    <div class="letterhead">
        <div class="company" th:text="${companyName}">(주)정도UIT</div>
        <div class="info"><span th:text="${companyAddr}">주소</span> | <span th:text="${companyTel}">전화</span> | <span th:text="${companyFax}">팩스</span></div>
    </div>

    <!-- 문서번호 -->
    <div class="doc-no" th:text="${doc.docNo}">문서번호</div>

    <!-- 문서 제목 -->
    <div class="doc-title" th:text="${doc.title}">문서 제목</div>

    <!-- 기본 정보 -->
    <table>
        <tr><th style="width:120px;">문서유형</th><td th:text="${T(com.swmanager.system.dto.DocumentDTO).getDocTypeLabel(doc.docType)}">유형</td>
            <th style="width:120px;">작성일</th><td th:text="${doc.createdAt != null ? #strings.substring(doc.createdAt, 0, 10) : '-'}">일자</td></tr>
        <tr><th>지자체</th><td th:text="${doc.cityNm != null ? doc.cityNm + ' ' + (doc.distNm != null ? doc.distNm : '') : '-'}">지자체</td>
            <th>작성자</th><td th:text="${doc.authorName}">작성자</td></tr>
    </table>

    <!-- 섹션 데이터 -->
    <th:block th:each="entry : ${sections}">
        <div class="section-title" th:text="${entry.key}">섹션</div>
        <table>
            <tr th:each="field : ${entry.value}">
                <th style="width:150px;" th:text="${field.key}">필드</th>
                <td th:text="${field.value}">값</td>
            </tr>
        </table>
    </th:block>

    <!-- 서명 영역 -->
    <div th:if="${signatures != null and !signatures.isEmpty()}" class="signature-area">
        <div th:each="sig : ${signatures}" class="sign-box">
            <div class="label" th:text="${sig.signerType == 'INSPECTOR' ? '점검자' : (sig.signerType == 'CONFIRMER' ? '확인자' : '대표자')}">유형</div>
            <div th:if="${sig.signatureImage != null}"><img th:src="${sig.signatureImage}" alt="서명"></div>
            <div th:unless="${sig.signatureImage != null}" class="line"></div>
            <div style="font-size:11px;" th:text="${sig.signerOrg}">소속</div>
            <div style="font-size:12px; font-weight:bold;" th:text="${sig.signerName}">이름</div>
        </div>
    </div>

    <!-- 직인 -->
    <div class="seal">
        <div class="seal-img">대표이사<br>(인)</div>
    </div>
</body>
</html>
