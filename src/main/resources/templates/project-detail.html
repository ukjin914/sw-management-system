<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>SW 사업 상세 정보 | 관리자 모드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --dark-navy: #1a237e;
            --bg-color: #f4f7f6;
            --card-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: var(--bg-color); margin: 0; padding: 40px 20px; color: #444; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: var(--card-shadow); overflow: hidden; }
        .page-header { background: var(--dark-navy); color: white; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .header-btns { display: flex; gap: 10px; }
        .btn-top { background: rgba(255,255,255,0.15); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; transition: 0.3s; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; gap: 5px; }
        .btn-top:hover { background: white; color: var(--dark-navy); }
        form { padding: 30px; }
        fieldset { border: 1px solid #e3e6f0; border-radius: 8px; padding: 25px; margin-bottom: 30px; background: #fcfdff; }
        legend { font-weight: 700; color: var(--primary-color); padding: 0 10px; font-size: 1.1rem; }
        .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; min-width: 220px; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #555; }
        input, select { padding: 12px; border: 1px solid #d1d3e2; border-radius: 6px; font-size: 0.95rem; outline: none; transition: 0.2s; }
        input[readonly], select[disabled] { background-color: #eaecf4; color: #6e707e; cursor: not-allowed; }
        .editable-active { background-color: #ffffff !important; color: #444 !important; border: 2px solid var(--primary-color) !important; cursor: text !important; }
        .code-field { background-color: #f8faff !important; color: #d32f2f !important; font-weight: 700; }
        .page-footer { padding: 25px 30px; background: #f8f9fc; border-top: 1px solid #e3e6f0; display: flex; justify-content: center; gap: 20px; }
        .btn-action { border: none; padding: 15px 40px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1rem; text-decoration: none; text-align: center; color: white; }
        .btn-edit   { background: var(--dark-navy); }
        .btn-delete { background: #e74a3b; }
        .btn-save   { background: #1cc88a; display: none; }
        .btn-list   { background: var(--secondary-color); }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="page-header">
        <h2><i class="fas fa-file-invoice-dollar"></i> SW 사업 상세 정보 조회 및 수정</h2>
        <div class="header-btns">
            <a th:href="@{/}"                class="btn-top"><i class="fas fa-home"></i> 메인으로</a>
            <a th:href="@{/projects/status}" class="btn-top"><i class="fas fa-list"></i> 현황 목록</a>
        </div>
    </div>

    <form id="projectForm" th:action="@{/projects/save}" th:object="${project}" method="post">
        <input type="hidden" th:field="*{projId}">

        <!-- ① 기본 및 담당자 정보 -->
        <fieldset>
            <legend><i class="fas fa-user-check"></i> 기본 및 담당자 정보</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>사업연도</label>
                    <input type="number" th:field="*{year}" readonly>
                </div>
                <div class="form-group">
                    <label>PMS코드</label>
                    <input type="text" th:field="*{pmsCd}" readonly>
                </div>
                <div class="form-group">
                    <label>사업 담당자</label>
                    <!--
                        조회: DB의 person_id(=users.user_id)와 일치하는 username 표시
                        수정: select 활성화 후 변경 가능
                        personList = userRepository.findByEnabledTrue()
                    -->
                    <select th:field="*{personId}" disabled>
                        <option value="">-- 담당자 선택 --</option>
                        <option th:each="p : ${personList}"
                                th:value="${p.userSeq}"
                                th:text="${p.username + ' (' + p.teamNm + ')'}">
                        </option>
                    </select>
                </div>
            </div>
        </fieldset>

        <!-- ② 행정 및 기관 정보 -->
        <fieldset>
            <legend><i class="fas fa-university"></i> 행정 및 기관 정보</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>시도광역</label>
                    <!--
                        조회: DB city_nm 값 그대로 표시
                        수정 모드 진입 시 loadDistricts() 로 시군구 목록 채워짐
                    -->
                    <select id="citySelect" th:field="*{cityNm}" disabled onchange="loadDistricts()">
                        <option value="">-- 선택 --</option>
                        <option th:each="sido : ${sidoList}"
                                th:value="${sido}"
                                th:text="${sido}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>기관코드</label>
                    <!-- 조회: DB org_cd 값 그대로 / 수정 모드: 시군구 선택 시 자동 갱신 -->
                    <input type="text" id="orgCd" th:field="*{orgCd}" class="code-field" readonly>
                </div>
                <div class="form-group">
                    <label>기관명</label>
                    <input type="text" th:field="*{orgNm}" readonly>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>시군구</label>
                    <!--
                        조회: DB dist_nm 값 그대로 표시 (단일 option으로 고정)
                        수정 모드: toggleEditMode에서 loadDistricts() 호출 후 전체 목록으로 교체
                    -->
                    <select id="distSelect" th:field="*{distNm}" disabled onchange="autoFillCodes()">
                        <!-- 조회 모드 전용: 현재 distNm 만 option으로 표시 -->
                        <option th:value="*{distNm}" th:text="*{distNm}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>행정구역코드</label>
                    <!-- 조회: DB dist_cd 값 그대로 / 수정 모드: 시군구 선택 시 자동 갱신 -->
                    <input type="text" id="distCd" th:field="*{distCd}" class="code-field" readonly>
                </div>
                <div class="form-group">
                    <label>기관장명</label>
                    <input type="text" th:field="*{orgLghNm}" readonly>
                </div>
            </div>
        </fieldset>

        <!-- ③ 사업 식별 정보 -->
        <fieldset>
            <legend><i class="fas fa-project-diagram"></i> 사업 식별 정보</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>SW사업형태</label>
                    <!--
                        조회: DB biz_type(cd) 와 일치하는 cont_frm_mst.nm 표시
                        수정: select 활성화
                    -->
                    <select th:field="*{bizType}" disabled>
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${contFrmList}"
                                th:value="${item.cd}"
                                th:text="${item.nm}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>SW사업종류</label>
                    <!--
                        조회: DB biz_cat(nm) 과 일치하는 prj_types.nm 표시
                        수정: 선택 변경 시 biz_cat_en 자동 갱신
                    -->
                    <select id="prjTypeSelect" th:field="*{bizCat}" disabled onchange="mapPrjType()">
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${prjTypesList}"
                                th:value="${item.nm}"
                                th:text="${item.nm}"
                                th:data-cd="${item.cd}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>사업종류 영문명</label>
                    <!-- 조회: DB biz_cat_en 값 그대로 / 수정 모드: 사업종류 선택 시 자동 갱신 -->
                    <input type="text" id="bizCatEn" th:field="*{bizCatEn}" class="code-field" readonly>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>시스템명</label>
                    <!--
                        조회: DB sys_nm 과 일치하는 sys_mst.nm 표시
                        수정: 선택 변경 시 sys_nm_en 자동 갱신
                    -->
                    <select id="sysMstSelect" th:field="*{sysNm}" disabled onchange="mapSysMst()">
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${sysMstList}"
                                th:value="${item.nm}"
                                th:text="${item.nm}"
                                th:data-cd="${item.cd}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>시스템 영문명</label>
                    <!-- 조회: DB sys_nm_en 값 그대로 / 수정 모드: 시스템명 선택 시 자동 갱신 -->
                    <input type="text" id="sysNmEn" th:field="*{sysNmEn}" class="code-field" readonly>
                </div>
            </div>
        </fieldset>

        <!-- ④ 계약정보 -->
        <fieldset>
            <legend><i class="fas fa-file-contract"></i> 계약정보</legend>
            <div class="form-row">
                <div class="form-group" style="flex: 2;"><label>사업명</label><input type="text" th:field="*{projNm}" readonly></div>
                <div class="form-group"><label>발주처</label><input type="text" th:field="*{client}" readonly></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>계약주체</label><input type="text" th:field="*{contEnt}" readonly></div>
                <div class="form-group"><label>계약부서</label><input type="text" th:field="*{contDept}" readonly></div>
                <div class="form-group">
                    <label>계약구분</label>
                    <select th:field="*{contType}" disabled>
                        <option value="직접">직접</option>
                        <option value="하도">하도</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <!-- ⑤ 일정정보 -->
        <fieldset>
            <legend><i class="fas fa-calendar-alt"></i> 일정정보</legend>
            <div class="form-row">
                <div class="form-group"><label>계약일</label>  <input type="text" name="contDt"  th:value="${project.contDt != null ? #temporals.format(project.contDt, 'yyyy-MM-dd') : ''}"  placeholder="YYYY-MM-DD" maxlength="10" readonly oninput="formatDate(this)"></div>
                <div class="form-group"><label>착수일</label>  <input type="text" name="startDt" th:value="${project.startDt != null ? #temporals.format(project.startDt, 'yyyy-MM-dd') : ''}" placeholder="YYYY-MM-DD" maxlength="10" readonly oninput="formatDate(this)"></div>
                <div class="form-group"><label>준공일</label>  <input type="text" name="endDt"   th:value="${project.endDt != null ? #temporals.format(project.endDt, 'yyyy-MM-dd') : ''}"   placeholder="YYYY-MM-DD" maxlength="10" readonly oninput="formatDate(this)"></div>
                <div class="form-group"><label>최초설치일</label><input type="text" name="instDt" th:value="${project.instDt != null ? #temporals.format(project.instDt, 'yyyy-MM-dd') : ''}" placeholder="YYYY-MM-DD" maxlength="10" readonly oninput="formatDate(this)"></div>
            </div>
        </fieldset>

        <!-- ⑥ 제품 및 금액정보 -->
        <fieldset>
            <legend><i class="fas fa-won-sign"></i> 제품 및 금액정보</legend>
            <div class="form-row">
                <div class="form-group"><label>예산금액</label><input type="number" th:field="*{budgAmt}" readonly></div>
                <div class="form-group"><label>계약금액</label><input type="number" th:field="*{contAmt}" readonly></div>
                <div class="form-group"><label>낙찰율(%)</label><input type="number" step="0.01" th:field="*{contRt}" readonly></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>SW요율(%)</label><input type="number" step="0.01" th:field="*{swRt}" readonly></div>
                <div class="form-group"><label>SW금액</label><input type="number" th:field="*{swAmt}" readonly></div>
                <div class="form-group"><label>컨설팅 금액</label><input type="number" th:field="*{cnsltAmt}" readonly></div>
                <div class="form-group"><label>DB구축 금액</label><input type="number" th:field="*{dbImplAmt}" readonly></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>패키지SW 금액</label><input type="number" th:field="*{pkgSwAmt}" readonly></div>
                <div class="form-group"><label>시스템개발 금액</label><input type="number" th:field="*{sysDevAmt}" readonly></div>
                <div class="form-group"><label>HW 금액</label><input type="number" th:field="*{hwAmt}" readonly></div>
                <div class="form-group"><label>기타 금액</label><input type="number" th:field="*{etcAmt}" readonly></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>외주금액</label><input type="number" th:field="*{outscrAmt}" readonly></div>
                <div class="form-group">
                    <label>청구여부</label>
                    <select id="payProgYn" th:field="*{payProgYn}" disabled onchange="togglePayProgFr()">
                        <option value="Y">Y</option>
                        <option value="N">N</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>청구형태</label>
                    <select id="payProgFr" th:field="*{payProgFr}" disabled>
                        <option value="">-- 선택 --</option>
                        <option value="월">월</option>
                        <option value="격월">격월</option>
                        <option value="분기">분기</option>
                        <option value="반기">반기</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>기성계 대상</label>
                    <select th:field="*{interimYn}" disabled>
                        <option value="Y">Y</option>
                        <option value="N">N</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>준공계 대상</label>
                    <select th:field="*{completionYn}" disabled>
                        <option value="Y">Y</option>
                        <option value="N">N</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>유지보수 유형</label>
                    <select th:field="*{maintType}" disabled>
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${maintTpList}" th:value="${item.cd}" th:text="${item.nm}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>계약 진행상태</label>
                    <select th:field="*{stat}" disabled>
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${contStatList}" th:value="${item.cd}" th:text="${item.nm}"></option>
                    </select>
                </div>
            </div>
        </fieldset>

        <div class="page-footer">
            <th:block sec:authorize="#authentication.principal.user.authProject == 'EDIT'">
                <button type="button" class="btn-action btn-edit"   id="btn-edit-mode"   onclick="toggleEditMode(true)">수정 모드 (Insert)</button>
                <button type="submit" class="btn-action btn-save"   id="btn-save-submit">수정 내용 저장</button>
                <button type="button" class="btn-action btn-delete" id="btn-delete-item" onclick="handleDelete()">삭제</button>
            </th:block>
            <a th:href="@{/projects/status}" class="btn-action btn-list">목록으로</a>
        </div>
    </form>

</div>

<script th:inline="javascript">
/*<![CDATA[*/

// ── 날짜 포맷 ────────────────────────────────────────────────────
function formatDate(input) {
    let v = input.value.replace(/[^0-9]/g, '').substring(0, 8);
    if (v.length > 6)      v = v.substring(0,4) + '-' + v.substring(4,6) + '-' + v.substring(6);
    else if (v.length > 4) v = v.substring(0,4) + '-' + v.substring(4);
    input.value = v;
}

// ── 수정 모드 ON/OFF ─────────────────────────────────────────────
async function toggleEditMode(enable) {
    const form = document.getElementById('projectForm');

    // readonly input (code-field 제외)
    form.querySelectorAll('input:not([type="hidden"]):not(.code-field)').forEach(el => {
        el.readOnly = !enable;
        el.classList.toggle('editable-active', enable);
    });
    // select
    form.querySelectorAll('select').forEach(el => {
        el.disabled = !enable;
        el.classList.toggle('editable-active', enable);
    });

    document.getElementById('btn-edit-mode').style.display   = enable ? 'none'         : 'inline-block';
    document.getElementById('btn-save-submit').style.display  = enable ? 'inline-block' : 'none';

    if (enable) {
        togglePayProgFr();

        // ── 수정 모드 진입 시 시군구 목록 복원 ────────────────────
        // DB에서 불러온 기존 값
        const savedDistNm = /*[[${project.distNm}]]*/ '';
        const savedDistCd = /*[[${project.distCd}]]*/ '';
        const savedOrgCd  = /*[[${project.orgCd}]]*/  '';

        const cityVal = document.getElementById('citySelect').value;
        if (cityVal) {
            await loadDistricts();   // 시도에 맞는 시군구 목록 로드
            // loadDistricts가 초기화한 코드 필드를 DB 값으로 복원
            if (savedDistNm && savedDistNm !== 'null') document.getElementById('distSelect').value = savedDistNm;
            if (savedDistCd && savedDistCd !== 'null') document.getElementById('distCd').value     = savedDistCd;
            if (savedOrgCd  && savedOrgCd  !== 'null') document.getElementById('orgCd').value      = savedOrgCd;
        }
    }
}

// ── 삭제 ────────────────────────────────────────────────────────
function handleDelete() {
    if (!confirm('정말로 이 사업 정보를 삭제하시겠습니까?')) return;
    const projId = /*[[${project.projId}]]*/ '';
    const f = document.createElement('form');
    f.method = 'post';
    f.action = '/projects/delete/' + projId;
    // CSRF 토큰 추가
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
    if (csrfToken) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = '_csrf';
        input.value = csrfToken;
        f.appendChild(input);
    }
    document.body.appendChild(f);
    f.submit();
}

// ── 시도 선택 → 시군구 목록 동적 로드 ─────────────────────────
async function loadDistricts() {
    const sido     = document.getElementById('citySelect').value;
    const distSel  = document.getElementById('distSelect');
    const distCdEl = document.getElementById('distCd');
    const orgCdEl  = document.getElementById('orgCd');

    if (!sido) {
        distSel.innerHTML = '<option value="">-- 시도를 먼저 선택하세요 --</option>';
        distCdEl.value = '';
        orgCdEl.value  = '';
        return;
    }

    distSel.innerHTML = '<option value="">-- 로딩 중... --</option>';
    distCdEl.value = '';
    orgCdEl.value  = '';

    try {
        const res  = await fetch('/projects/api/districts?sido=' + encodeURIComponent(sido));
        const data = await res.json();
        distSel.innerHTML = '<option value="">-- 선택 --</option>';
        data.forEach(item => {
            const opt = document.createElement('option');
            opt.value        = item.sggNm;
            opt.innerText    = item.sggNm;
            opt.dataset.dist = (item.admSectC || '').trim();
            opt.dataset.inst = (item.insttC   || '').trim();
            distSel.appendChild(opt);
        });
    } catch (e) {
        console.error('[loadDistricts]', e);
        distSel.innerHTML = '<option value="">-- 로드 실패 --</option>';
    }
}

// ── 시군구 선택 → 코드 자동 채움 ─────────────────────────────
function autoFillCodes() {
    const sel = document.getElementById('distSelect');
    const opt = sel.options[sel.selectedIndex];
    document.getElementById('distCd').value = (opt && opt.dataset.dist) ? opt.dataset.dist : '';
    document.getElementById('orgCd').value  = (opt && opt.dataset.inst) ? opt.dataset.inst : '';
}

// ── SW사업종류 → 영문명 자동 표출 ───────────────────────────────
function mapPrjType() {
    const sel = document.getElementById('prjTypeSelect');
    const opt = sel.options[sel.selectedIndex];
    document.getElementById('bizCatEn').value = (opt && opt.dataset.cd) ? opt.dataset.cd : '';
}

// ── 시스템명 → 영문명 자동 표출 ─────────────────────────────────
function mapSysMst() {
    const sel = document.getElementById('sysMstSelect');
    const opt = sel.options[sel.selectedIndex];
    document.getElementById('sysNmEn').value = (opt && opt.dataset.cd) ? opt.dataset.cd : '';
}

// ── 청구여부 Y/N ──────────────────────────────────────────────
function togglePayProgFr() {
    const yn = document.getElementById('payProgYn');
    const fr = document.getElementById('payProgFr');
    if (!yn || !fr || yn.disabled) return;
    if (yn.value === 'N') { fr.value = ''; fr.disabled = true; }
    else                  { fr.disabled = false; }
}

// ── 키보드 단축키 ─────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON' && e.target.type !== 'submit') {
            e.preventDefault();
        }
    }
    if (e.key === 'Insert') {
        e.preventDefault();
        const editBtn = document.getElementById('btn-edit-mode');
        if (editBtn && editBtn.style.display !== 'none') toggleEditMode(true);
    }
    if (e.key === 'End') {
        e.preventDefault();
        const saveBtn = document.getElementById('btn-save-submit');
        if (saveBtn && saveBtn.style.display !== 'none') saveBtn.click();
    }
});
