# ========================================
# 1. 데이터베이스 연결 정보
# ========================================
# 환경변수 미설정 시 기본값 사용 (운영 환경에서는 반드시 환경변수 설정 필요)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ========================================
# 2. JPA 설정
# ========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# 3. UTF-8 한글 설정
# ========================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# ========================================
# 4. 세션 설정
# ========================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=SWMANAGER_SESSION
server.servlet.session.cookie.http-only=true
# 개발환경: false, 운영환경(HTTPS)에서는 application-prod.properties에서 true로 오버라이드
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.max-age=1800
server.servlet.session.tracking-modes=cookie

# ========================================
# 5. 업로드 용량 설정
# ========================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ========================================
# 6. GeoNURIS 라이선스 발급 설정
# ========================================
# GeoNURIS_License.jar 실제 위치 (서버에 복사 후 경로 수정)
geonuris.license.jar.path=src/main/resources/geonuris/GeoNURIS_License.jar
# Java 실행 경로 (기본: java, JDK 경로 지정 가능)
geonuris.java.path=java